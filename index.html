<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Земля с кликами</title>
<style>
  body { margin:0; overflow:hidden; background:black; }
</style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>
// СЦЕНА
const scene = new THREE.Scene();

// КАМЕРА
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.z = 3;

// РЕНДЕР
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// УПРАВЛЕНИЕ
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// СВЕТ
scene.add(new THREE.AmbientLight(0x404040));
const light = new THREE.PointLight(0xffffff, 1.5);
light.position.set(5,3,5);
scene.add(light);

// ТЕКСТУРЫ
const loader = new THREE.TextureLoader();
const earthMap = loader.load('https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/textures/planets/earth_atmos_2048.jpg');

// ЗЕМЛЯ
const earth = new THREE.Mesh(
  new THREE.SphereGeometry(1,128,128),
  new THREE.MeshPhongMaterial({ map: earthMap })
);
scene.add(earth);

// ⭐ ЗВЁЗДЫ
const starsGeo = new THREE.BufferGeometry();
const stars = [];
for(let i=0;i<10000;i++){
  stars.push((Math.random()-0.5)*2000);
  stars.push((Math.random()-0.5)*2000);
  stars.push((Math.random()-0.5)*2000);
}
starsGeo.setAttribute('position', new THREE.Float32BufferAttribute(stars,3));
scene.add(new THREE.Points(starsGeo,new THREE.PointsMaterial({color:0xffffff})));

// =======================
// 🌍 КОНТИНЕНТЫ (зоны)
// =======================

const continents = [];

// функция создания зоны
function createContinent(name, x, y, z, link){
  const mesh = new THREE.Mesh(
    new THREE.SphereGeometry(0.3, 16, 16),
    new THREE.MeshBasicMaterial({ 
      color: 0xff0000,
      transparent:true,
      opacity:0.0 // невидимая зона
    })
  );
  
  mesh.position.set(x,y,z);
  mesh.userData = { name, link };
  
  scene.add(mesh);
  continents.push(mesh);
}

// ПРИМЕР координат (можно подправить)
createContinent("Европа", 0.5, 0.5, 0.8, "europe.html");
createContinent("Азия", 1, 0.2, 0.3, "asia.html");
createContinent("Африка", 0.3, -0.5, 0.8, "africa.html");
createContinent("Америка", -0.8, 0.3, 0.5, "america.html");
createContinent("Австралия", 0.8, -0.8, 0.3, "australia.html");

// =======================
// 🖱 КЛИК
// =======================

const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

window.addEventListener("click", (event)=>{
  
  mouse.x = (event.clientX / innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);

  const intersects = raycaster.intersectObjects(continents);

  if(intersects.length > 0){
    const obj = intersects[0].object;
    
    // переход
    window.open(obj.userData.link, "_blank");
  }
});

// АНИМАЦИЯ
function animate(){
  requestAnimationFrame(animate);

  earth.rotation.y += 0.001;

  controls.update();
  renderer.render(scene,camera);
}
animate();

// РЕСАЙЗ
addEventListener('resize', ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

</script>

</body>
</html>
