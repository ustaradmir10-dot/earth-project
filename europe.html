<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Европа</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top, #001a2e, #000);
  color: white;
}

header {
  text-align: center;
  padding: 40px 20px;
}

.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 20px;
  padding: 20px;
}

.card {
  background: rgba(255,255,255,0.05);
  border-radius: 15px;
  overflow: hidden;
  cursor: pointer;
  transition: 0.3s;
  text-align: center;
}

.card:hover {
  transform: scale(1.05);
  background: rgba(255,255,255,0.1);
}

.flag {
  width: 100%;
  height: 120px;
  object-fit: cover;
}

.name {
  padding: 10px;
}

</style>
</head>

<body>

<header>
  <h1>Европа</h1>
  <p>Выберите страну</p>
</header>

<div class="container">

<div class="card" onclick="go('country.html?name=germany')">
  <img class="flag" src="https://flagcdn.com/w640/de.png">
  <div class="name">Германия</div>
</div>
